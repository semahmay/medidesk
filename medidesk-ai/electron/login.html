<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediDesk AI — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      -webkit-app-region: drag; /* allow dragging the window */
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 380px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-app-region: no-drag;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1D9E75, #0ea5e9);
      border-radius: 16px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f1f5f9;
    }

    p.subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 36px;
      line-height: 1.5;
    }

    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: #fff;
      color: #1e293b;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-google:hover:not(:disabled) {
      background: #f1f5f9;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .btn-google:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-google svg { flex-shrink: 0; }

    .status {
      margin-top: 20px;
      font-size: 13px;
      min-height: 20px;
      color: #94a3b8;
    }

    .status.error { color: #f87171; }
    .status.loading { color: #60a5fa; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(96,165,250,0.3);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏥</div>
    <h1>MediDesk AI</h1>
    <p class="subtitle">Patient management for modern clinics.<br/>Sign in to continue.</p>

    <button class="btn-google" id="loginBtn" onclick="handleLogin()">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.innerHTML = msg;
    }

    function handleLogin() {
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      setStatus('<span class="spinner"></span>Opening Google login…', 'loading');
      window.electronAPI.startLogin();
    }

    // Listen for login result from main process
    window.electronAPI.onLoginSuccess((_e, user) => {
      setStatus('✅ Welcome, ' + user.name + '!', '');
    });

    window.electronAPI.onLoginError((_e, message) => {
      const btn = document.getElementById('loginBtn');
      btn.disabled = false;
      setStatus('❌ ' + message, 'error');
    });
  </script>
</body>
</html>
