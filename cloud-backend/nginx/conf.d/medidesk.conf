# ── MediDesk AI — Nginx Production Config (HTTP) ─────────────────────────────
#
# HTTP-only for IP-based deployment (40.81.230.3).
# upstream medidesk_api and limit_req_zone are defined in nginx.conf.
#
# To upgrade to HTTPS with a real domain:
#   1. Point a domain to 40.81.230.3
#   2. Run: certbot --nginx -d yourdomain.com
#   3. Re-enable the HTTPS server block

server {
    listen 80;
    server_name _;   # match any hostname / IP

    # ACME challenge placeholder for future Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── WebSocket (SocketIO) ──────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://medidesk_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Auth endpoints (strict rate limit) ───────────────────────────────────
    location ~ ^/api/auth {
        limit_req        zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass       http://medidesk_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── File upload (size limit + rate limit) ─────────────────────────────────
    location ~ ^/api/v2/attachments/.+$ {
        limit_req            zone=api_upload burst=3 nodelay;
        client_max_body_size 26M;
        proxy_pass           http://medidesk_api;
        proxy_set_header     Host $host;
        proxy_set_header     X-Real-IP $remote_addr;
        proxy_read_timeout   120s;
    }

    # ── Health check (no rate limit, no auth) ─────────────────────────────────
    location = /api/health {
        proxy_pass http://medidesk_api;
        access_log off;
    }

    # ── General API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req        zone=api_general burst=20 nodelay;
        proxy_pass       http://medidesk_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
